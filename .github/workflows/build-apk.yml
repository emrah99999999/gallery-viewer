name: Build Capacitor APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'          # تغییر از 17 به 21

      - name: Create web directory
        run: |
          mkdir -p www
          cp index.html style.css script.js www/

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Install Capacitor Core and Android
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/android

      - name: Initialize Capacitor
        run: npx cap init GalleryViewer com.example.galleryviewer --web-dir www

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web files
        run: npx cap sync

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
