        run: |
          mkdir -p www
          cp index.html style.css script.js www/ || true

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Install Capacitor Core and Android
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/android

      - name: Initialize Capacitor
        run: npx cap init GalleryViewer com.example.galleryviewer --web-dir www

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web files
        run: npx cap sync

      - name: Fix Kotlin version conflict
        run: |
          # Force consistent Kotlin version
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' android/build.gradle
          cat >> android/app/build.gradle << 'EOF'
          
configurations.all
